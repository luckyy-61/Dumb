<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>are you dumb?</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #ffe1f0, #d8e4ff);
    overflow: hidden;
  }
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 30px;
    max-width: 480px;
    position: relative;
  }
  .screen.active {
    display: flex;
  }
  h1 {
    font-size: clamp(28px, 7vw, 42px);
    color: #2b2b40;
    margin-bottom: 30px;
    line-height: 1.3;
  }
  .sub {
    font-size: 16px;
    color: #555;
    margin-top: -16px;
    margin-bottom: 24px;
  }
  .btn-row {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    width: 100%;
    min-height: 70px;
  }
  button {
    font-size: 18px;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  button:active {
    transform: scale(0.95);
  }
  .yes-btn {
    background: #ff6fa5;
    color: white;
    box-shadow: 0 6px 16px rgba(255, 111, 165, 0.4);
  }
  .no-btn {
    background: #eaeaea;
    color: #333;
  }
  .floating {
    position: fixed;
    z-index: 10;
  }
  .emoji {
    font-size: 60px;
    margin-bottom: 10px;
  }
  .cat-photo {
    width: 180px;
    height: 170px;
    object-fit: cover;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    margin-bottom: 22px;
  }
  #screen3 h1 {
    color: #ff3366;
  }
  .restart {
    margin-top: 28px;
    background: transparent;
    color: #888;
    font-size: 14px;
    text-decoration: underline;
    padding: 6px;
  }
  .next-btn {
    background: #ff6fa5;
    color: white;
    box-shadow: 0 6px 16px rgba(255, 111, 165, 0.4);
    margin-top: 8px;
  }
  .flowers {
    font-size: 48px;
    margin-bottom: 18px;
    letter-spacing: 6px;
  }
  #screen5 h1 {
    color: #b23a48;
  }
  .wilted {
    font-size: 56px;
    margin-bottom: 10px;
  }
</style>
</head>

    <h1>ahh, because you got<br>FINE written all over you</h1>
    <button class="yes-btn next-btn" onclick="goTo('screen4')">next →</button>
  </div>

  <!-- Screen 4: Flowers -->
  <div class="screen" id="screen4">
    <div class="flowers">🌷🌹🌷</div>
    <h1>these are for you</h1>
    <button class="yes-btn next-btn" onclick="goTo('screen5')">next →</button>
  </div>

  <!-- Screen 5: Mona Lisa -->
  <div class="screen" id="screen5">
    <div class="wilted">🥀</div>
    <h1>Monalisa will be the perfect piece of art if you didn't exist 🥀</h1>
    <button class="restart" onclick="restart()">run it back</button>
  </div>

<script>
  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'screen2') makeFloaty('floatYes');
  }

  function resetFloatBtn(btn) {
    btn.classList.remove('floating');
    btn.style.position = '';
    btn.style.left = '';
    btn.style.top = '';
  }

  function restart() {
    goTo('screen1');
    resetFloatBtn(document.getElementById('floatNo1'));
    resetFloatBtn(document.getElementById('floatYes'));
  }

  // Make a button dodge the cursor/touch forever, always 140px out of reach
  function makeFloaty(btnId) {
    const btn = document.getElementById(btnId);
    if (btn.dataset.floatBound) return; // only bind listeners once
    btn.dataset.floatBound = 'true';

    function moveAway(clientX, clientY) {
      const rect = btn.getBoundingClientRect();
      const btnCenterX = rect.left + rect.width / 2;
      const btnCenterY = rect.top + rect.height / 2;
      const dist = Math.hypot(clientX - btnCenterX, clientY - btnCenterY);

      if (dist < 140) {
        btn.classList.add('floating');
        const margin = 80;
        const maxX = window.innerWidth - rect.width - margin;
        const maxY = window.innerHeight - rect.height - margin;
        const newX = Math.random() * Math.max(maxX, 50) + margin / 2;
        const newY = Math.random() * Math.max(maxY, 50) + margin / 2;
        btn.style.left = newX + 'px';
        btn.style.top = newY + 'px';
      }
    }

    document.addEventListener('mousemove', (e) => {
      if (btn.closest('.screen').classList.contains('active')) moveAway(e.clientX, e.clientY);
    });
    document.addEventListener('touchstart', (e) => {
      if (!btn.closest('.screen').classList.contains('active')) return;
      const t = e.touches[0];
      moveAway(t.clientX, t.clientY);
    }, { passive: true });

    // Prevent ever actually clicking/tapping it
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const margin = 80;
      const rect = btn.getBoundingClientRect();
      const maxX = window.innerWidth - rect.width - margin;
      const maxY = window.innerHeight - rect.height - margin;
      btn.classList.add('floating');
      btn.style.left = (Math.random() * Math.max(maxX, 50) + margin / 2) + 'px';
      btn.style.top = (Math.random() * Math.max(maxY, 50) + margin / 2) + 'px';
    });
  }

  // Screen 1's No button floats from the very start
  makeFloaty('floatNo1');
</script>

</body>
</html>
